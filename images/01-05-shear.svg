<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" font-family="Georgia, serif">
  <defs>
    <marker id="shink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#141414"/>
    </marker>
    <marker id="shpine" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B5E43"/>
    </marker>
  </defs>

  <!-- LEFT: original grid -->
  <text x="115" y="30" font-size="12" fill="#4a4a4a" text-anchor="middle">before</text>
  <g stroke="#dcdcdc" stroke-width="1">
    <line x1="50" y1="80" x2="50" y2="200"/><line x1="90" y1="80" x2="90" y2="200"/>
    <line x1="130" y1="80" x2="130" y2="200"/><line x1="170" y1="80" x2="170" y2="200"/>
    <line x1="50" y1="80" x2="170" y2="80"/><line x1="50" y1="120" x2="170" y2="120"/>
    <line x1="50" y1="160" x2="170" y2="160"/><line x1="50" y1="200" x2="170" y2="200"/>
  </g>
  <!-- basis at origin (50,200) -->
  <line x1="50" y1="200" x2="90" y2="200" stroke="#141414" stroke-width="2.4" marker-end="url(#shink)"/>
  <line x1="50" y1="200" x2="50" y2="160" stroke="#1B5E43" stroke-width="2.4" marker-end="url(#shpine)"/>

  <!-- ARROW between -->
  <text x="230" y="145" font-size="20" fill="#8a8a8a" text-anchor="middle">→</text>

  <!-- RIGHT: sheared grid. e1 stays (40,0); e2 goes to (40,-40) i.e. tilts right -->
  <text x="345" y="30" font-size="12" fill="#4a4a4a" text-anchor="middle">after</text>
  <g stroke="#dcdcdc" stroke-width="1">
    <!-- vertical lines become slanted: each original vertical shifts right as it goes up -->
    <line x1="290" y1="200" x2="330" y2="80"/><line x1="330" y1="200" x2="370" y2="80"/>
    <line x1="370" y1="200" x2="410" y2="80"/><line x1="410" y1="200" x2="450" y2="80"/>
    <!-- horizontal lines stay horizontal but shift right with height -->
    <line x1="290" y1="200" x2="410" y2="200"/>
    <line x1="303" y1="160" x2="423" y2="160"/>
    <line x1="317" y1="120" x2="437" y2="120"/>
    <line x1="330" y1="80" x2="450" y2="80"/>
  </g>
  <!-- basis at origin (290,200): e1 unchanged, e2 tilted right -->
  <line x1="290" y1="200" x2="330" y2="200" stroke="#141414" stroke-width="2.4" marker-end="url(#shink)"/>
  <line x1="290" y1="200" x2="330" y2="160" stroke="#1B5E43" stroke-width="2.4" marker-end="url(#shpine)"/>
</svg>