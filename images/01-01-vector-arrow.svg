<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 340" font-family="Georgia, serif">
  <defs>
    <marker id="head" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#141414"/>
    </marker>
    <pattern id="grid1" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#dcdcdc" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="460" height="340" fill="url(#grid1)"/>

  <!-- axes, mid-grey so they sit back with the grid -->
  <line x1="60" y1="280" x2="420" y2="280" stroke="#b0b0b0" stroke-width="1.2"/>
  <line x1="60" y1="280" x2="60" y2="40" stroke="#b0b0b0" stroke-width="1.2"/>

  <!-- drop lines -->
  <line x1="340" y1="280" x2="340" y2="110" stroke="#8a8a8a" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="60" y1="110" x2="340" y2="110" stroke="#8a8a8a" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- the arrow -->
  <line x1="60" y1="280" x2="340" y2="110" stroke="#141414" stroke-width="2" marker-end="url(#head)"/>

  <!-- axis labels -->
  <text x="240" y="315" font-size="15" fill="#141414" text-anchor="middle">tempo</text>
  <text x="26" y="160" font-size="15" fill="#141414" text-anchor="middle"
        transform="rotate(-90 26 160)">loudness</text>

  <!-- value labels -->
  <text x="340" y="299" font-size="13" fill="#4a4a4a" text-anchor="middle">128</text>
  <text x="48" y="115" font-size="13" fill="#4a4a4a" text-anchor="end">7</text>
</svg>