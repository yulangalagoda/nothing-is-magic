<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" font-family="Georgia, serif">
  <defs>
    <marker id="cink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#141414"/>
    </marker>
    <marker id="cpine" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B5E43"/>
    </marker>
  </defs>

  <!-- the span: a single line through the origin, the only reachable set -->
  <line x1="40" y1="330" x2="420" y2="90" stroke="#1B5E43" stroke-width="6" opacity="0.13"/>

  <!-- origin -->
  <circle cx="180" cy="242" r="3" fill="#141414"/>

  <!-- w = 2v, the longer copy, drawn first/underneath -->
  <line x1="180" y1="242" x2="292" y2="171" stroke="#1B5E43" stroke-width="2.2" marker-end="url(#cpine)"/>

  <!-- v, ink, on top -->
  <line x1="180" y1="242" x2="236" y2="207" stroke="#141414" stroke-width="2.6" marker-end="url(#cink)"/>

  <!-- labels -->
  <text x="214" y="200" font-size="15" fill="#141414" font-style="italic">v</text>
  <text x="270" y="165" font-size="15" fill="#1B5E43" font-style="italic">w = 2v</text>
</svg>