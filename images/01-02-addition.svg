<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" font-family="Georgia, serif">
  <defs>
    <marker id="ink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#141414"/>
    </marker>
    <marker id="grey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9a9a"/>
    </marker>
    <marker id="pine" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B5E43"/>
    </marker>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#dcdcdc" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="460" height="360" fill="url(#grid)"/>

  <!-- parallelogram fill -->
  <polygon points="70,300 250,240 390,150 210,210" fill="#1B5E43" opacity="0.05"/>

  <!-- second-leg copies, muted grey -->
  <line x1="250" y1="240" x2="390" y2="150" stroke="#9a9a9a" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#grey)"/>
  <line x1="210" y1="210" x2="390" y2="150" stroke="#9a9a9a" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#grey)"/>

  <!-- originals, ink -->
  <line x1="70" y1="300" x2="250" y2="240" stroke="#141414" stroke-width="2" marker-end="url(#ink)"/>
  <line x1="70" y1="300" x2="210" y2="210" stroke="#141414" stroke-width="2" marker-end="url(#ink)"/>

  <!-- the sum, pine -->
  <line x1="70" y1="300" x2="390" y2="150" stroke="#1B5E43" stroke-width="2.4" marker-end="url(#pine)"/>

  <!-- origin dot -->
  <circle cx="70" cy="300" r="3" fill="#141414"/>

  <!-- labels -->
  <text x="150" y="285" font-size="15" fill="#141414" font-style="italic">v</text>
  <text x="130" y="248" font-size="15" fill="#141414" font-style="italic">w</text>
  <text x="325" y="185" font-size="15" fill="#1B5E43" font-style="italic">v + w</text>
  <text x="330" y="212" font-size="13" fill="#9a9a9a" font-style="italic">w</text>
  <text x="305" y="235" font-size="13" fill="#9a9a9a" font-style="italic">v</text>
</svg>