<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" font-family="Georgia, serif">
  <defs>
    <marker id="ctink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#141414"/>
    </marker>
    <marker id="ctpine" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B5E43"/>
    </marker>
    <marker id="ctgrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9a9a"/>
    </marker>
  </defs>

  <!-- origin -->
  <circle cx="90" cy="240" r="3" fill="#141414"/>

  <!-- v, ink -->
  <line x1="90" y1="240" x2="250" y2="110" stroke="#141414" stroke-width="2.6" marker-end="url(#ctink)"/>
  <!-- w, pine -->
  <line x1="90" y1="240" x2="330" y2="180" stroke="#1B5E43" stroke-width="2.4" marker-end="url(#ctpine)"/>

  <!-- v's axis pieces, grey dashed: horizontal then vertical -->
  <line x1="90" y1="240" x2="250" y2="240" stroke="#9a9a9a" stroke-width="1.4" stroke-dasharray="4 3"/>
  <line x1="250" y1="240" x2="250" y2="110" stroke="#9a9a9a" stroke-width="1.4" stroke-dasharray="4 3"/>

  <!-- w's axis pieces, grey dashed: horizontal then vertical -->
  <line x1="90" y1="240" x2="330" y2="240" stroke="#9a9a9a" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>
  <line x1="330" y1="240" x2="330" y2="180" stroke="#9a9a9a" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>

  <!-- right-angle tick at origin between the two axis directions -->
  <path d="M 90 228 L 102 228 L 102 240" fill="none" stroke="#8a8a8a" stroke-width="1"/>

  <!-- labels -->
  <text x="175" y="168" font-size="15" fill="#141414" font-style="italic">v</text>
  <text x="315" y="205" font-size="15" fill="#1B5E43" font-style="italic">w</text>
  <text x="160" y="258" font-size="12" fill="#4a4a4a">first axis</text>
  <text x="256" y="180" font-size="12" fill="#4a4a4a">second axis</text>
</svg>