<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" font-family="Georgia, serif">
  <defs>
    <marker id="inink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#141414"/>
    </marker>
    <marker id="inpine" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B5E43"/>
    </marker>
    <marker id="ingrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9a9a"/>
    </marker>
    <pattern id="ingrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#dcdcdc" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="460" height="260" fill="url(#ingrid)"/>

  <!-- LEFT: independent, two directions -->
  <text x="115" y="30" font-size="12" fill="#4a4a4a" text-anchor="middle">independent</text>
  <circle cx="70" cy="200" r="3" fill="#141414"/>
  <line x1="70" y1="200" x2="160" y2="200" stroke="#141414" stroke-width="2.4" marker-end="url(#inink)"/>
  <line x1="70" y1="200" x2="110" y2="110" stroke="#1B5E43" stroke-width="2.4" marker-end="url(#inpine)"/>

  <!-- RIGHT: dependent, same line -->
  <text x="345" y="30" font-size="12" fill="#4a4a4a" text-anchor="middle">dependent</text>
  <line x1="270" y1="220" x2="440" y2="120" stroke="#9a9a9a" stroke-width="5" opacity="0.14"/>
  <circle cx="300" cy="200" r="3" fill="#141414"/>
  <line x1="300" y1="200" x2="370" y2="159" stroke="#1B5E43" stroke-width="2.2" marker-end="url(#inpine)"/>
  <line x1="300" y1="200" x2="410" y2="135" stroke="#141414" stroke-width="2.4" marker-end="url(#inink)"/>
  <text x="360" y="235" font-size="11" fill="#4a4a4a" text-anchor="middle" font-style="italic">both on one line</text>
</svg>