<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" font-family="Georgia, serif">
  <defs>
    <marker id="dcink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#141414"/>
    </marker>
    <marker id="dcpine" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B5E43"/>
    </marker>
    <pattern id="dcgrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#dcdcdc" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="460" height="260" fill="url(#dcgrid)"/>

  <!-- LEFT: unit square -->
  <text x="100" y="30" font-size="12" fill="#4a4a4a" text-anchor="middle">unit square, area 1</text>
  <rect x="70" y="150" width="50" height="50" fill="#1B5E43" fill-opacity="0.08"/>
  <circle cx="70" cy="200" r="2.5" fill="#141414"/>
  <line x1="70" y1="200" x2="120" y2="200" stroke="#141414" stroke-width="2.2" marker-end="url(#dcink)"/>
  <line x1="70" y1="200" x2="70" y2="150" stroke="#1B5E43" stroke-width="2.2" marker-end="url(#dcpine)"/>

  <text x="230" y="150" font-size="16" fill="#9a9a9a" text-anchor="middle">→</text>

  <!-- RIGHT: collapsed to a line -->
  <text x="360" y="30" font-size="12" fill="#4a4a4a" text-anchor="middle">flattened to a line, area 0</text>
  <line x1="300" y1="210" x2="440" y2="130" stroke="#1B5E43" stroke-width="5" opacity="0.20"/>
  <circle cx="300" cy="210" r="2.5" fill="#141414"/>
  <line x1="300" y1="210" x2="400" y2="153" stroke="#141414" stroke-width="2.2" marker-end="url(#dcink)"/>
  <line x1="300" y1="210" x2="370" y2="170" stroke="#1B5E43" stroke-width="2.2" marker-end="url(#dcpine)"/>
  <text x="380" y="205" font-size="15" fill="#4a4a4a" text-anchor="middle" font-style="italic">det = 0</text>
</svg>