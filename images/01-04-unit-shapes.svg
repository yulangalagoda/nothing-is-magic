<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" font-family="Georgia, serif">
  <defs>
    <pattern id="usgrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#dcdcdc" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="460" height="260" fill="url(#usgrid)"/>

  <!-- LEFT: L2 circle, centre (120,130), r=70 -->
  <line x1="40" y1="130" x2="200" y2="130" stroke="#b0b0b0" stroke-width="1"/>
  <line x1="120" y1="50" x2="120" y2="210" stroke="#b0b0b0" stroke-width="1"/>
  <circle cx="120" cy="130" r="70" fill="#1B5E43" fill-opacity="0.06" stroke="#141414" stroke-width="2"/>
  <text x="120" y="240" font-size="14" fill="#141414" text-anchor="middle">L2: a circle</text>

  <!-- RIGHT: L1 diamond, centre (340,130), reach 70 on each axis -->
  <line x1="260" y1="130" x2="420" y2="130" stroke="#b0b0b0" stroke-width="1"/>
  <line x1="340" y1="50" x2="340" y2="210" stroke="#b0b0b0" stroke-width="1"/>
  <polygon points="340,60 410,130 340,200 270,130" fill="#1B5E43" fill-opacity="0.06" stroke="#141414" stroke-width="2"/>
  <!-- mark the corners on the axes -->
  <circle cx="410" cy="130" r="3" fill="#1B5E43"/>
  <circle cx="270" cy="130" r="3" fill="#1B5E43"/>
  <circle cx="340" cy="60" r="3" fill="#1B5E43"/>
  <circle cx="340" cy="200" r="3" fill="#1B5E43"/>
  <text x="340" y="240" font-size="14" fill="#141414" text-anchor="middle">L1: a diamond</text>
</svg>