<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" font-family="Georgia, serif">
  <defs>
    <marker id="sink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#141414"/>
    </marker>
    <marker id="spine" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B5E43"/>
    </marker>
    <marker id="sgrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9a9a"/>
    </marker>
    <pattern id="sgrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#dcdcdc" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="460" height="300" fill="url(#sgrid)"/>

  <!-- the shared line, faint, drawn full width -->
  <line x1="40" y1="220" x2="420" y2="70" stroke="#b8b8b8" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- origin -->
  <circle cx="150" cy="192" r="3" fill="#141414"/>

  <!-- -v, reaching back through origin, grey -->
  <line x1="150" y1="192" x2="70" y2="224" stroke="#9a9a9a" stroke-width="2" marker-end="url(#sgrey)"/>

  <!-- 2v, pine, the long one -->
  <line x1="150" y1="192" x2="390" y2="96" stroke="#1B5E43" stroke-width="2.4" marker-end="url(#spine)"/>

  <!-- v, ink, drawn last so it sits on top -->
  <line x1="150" y1="192" x2="270" y2="144" stroke="#141414" stroke-width="2.6" marker-end="url(#sink)"/>

  <!-- labels -->
  <text x="205" y="158" font-size="15" fill="#141414" font-style="italic">v</text>
  <text x="330" y="112" font-size="15" fill="#1B5E43" font-style="italic">2v</text>
  <text x="95" y="228" font-size="15" fill="#9a9a9a" font-style="italic">−v</text>
</svg>