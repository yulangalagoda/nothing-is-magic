<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" font-family="Georgia, serif">
  <defs>
    <marker id="pvink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#141414"/>
    </marker>
    <marker id="pwpine" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B5E43"/>
    </marker>
  </defs>

  <!-- origin -->
  <circle cx="90" cy="240" r="3" fill="#141414"/>

  <!-- w, pine, along the ground -->
  <line x1="90" y1="240" x2="380" y2="240" stroke="#1B5E43" stroke-width="2.4" marker-end="url(#pwpine)"/>

  <!-- v, ink, tilted up -->
  <line x1="90" y1="240" x2="250" y2="110" stroke="#141414" stroke-width="2.6" marker-end="url(#pvink)"/>

  <!-- projection drop line, dashed grey, from tip of v straight down to w's line -->
  <line x1="250" y1="110" x2="250" y2="240" stroke="#8a8a8a" stroke-width="1.2" stroke-dasharray="4 4"/>

  <!-- the shadow itself, a thicker segment on w's line, muted pine -->
  <line x1="90" y1="240" x2="250" y2="240" stroke="#1B5E43" stroke-width="5" opacity="0.28"/>

  <!-- right-angle tick where the drop meets w -->
  <path d="M 238 240 L 238 228 L 250 228" fill="none" stroke="#8a8a8a" stroke-width="1"/>

  <!-- labels -->
  <text x="175" y="168" font-size="15" fill="#141414" font-style="italic">v</text>
  <text x="360" y="262" font-size="15" fill="#1B5E43" font-style="italic">w</text>
  <text x="150" y="262" font-size="13" fill="#1B5E43" opacity="0.75">shadow</text>
</svg>