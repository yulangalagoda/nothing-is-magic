<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 340" font-family="Georgia, serif">
  <defs>
    <marker id="tpink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#141414"/>
    </marker>
    <pattern id="tpgrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#dcdcdc" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="460" height="340" fill="url(#tpgrid)"/>

  <!-- origin and target, at (90,280) and (90+90=180 across? use 3 and 4 blocks of 30px) -->
  <!-- origin (90,280); 3 across = +90 -> x=180; 4 up = -120 -> y=160 -->

  <!-- L1 pedestrian path: along streets, pine, thick-ish -->
  <polyline points="90,280 180,280 180,160" fill="none" stroke="#1B5E43" stroke-width="3" stroke-linejoin="round"/>

  <!-- L2 straight diagonal, ink with arrowhead -->
  <line x1="90" y1="280" x2="180" y2="160" stroke="#141414" stroke-width="2.4" marker-end="url(#tpink)"/>

  <!-- endpoint dots -->
  <circle cx="90" cy="280" r="3.5" fill="#141414"/>
  <circle cx="180" cy="160" r="3.5" fill="#141414"/>

  <!-- labels -->
  <text x="150" y="205" font-size="14" fill="#141414" font-style="italic" text-anchor="end">5</text>
  <text x="135" y="300" font-size="14" fill="#1B5E43">3</text>
  <text x="192" y="225" font-size="14" fill="#1B5E43">4</text>
  <text x="250" y="250" font-size="13" fill="#141414">crow flies 5 (L2)</text>
  <text x="250" y="272" font-size="13" fill="#1B5E43">pedestrian walks 7 (L1)</text>
</svg>