<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" font-family="Georgia, serif">
  <defs>
    <marker id="bcink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#141414"/>
    </marker>
    <marker id="bcpine" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B5E43"/>
    </marker>
    <pattern id="bcgrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#dcdcdc" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="460" height="300" fill="url(#bcgrid)"/>

  <!-- origin at (90,240) -->
  <!-- basis: e1 = +60,0 -> (150,240); e2 = 0,-60 -> (90,180) -->
  <!-- target v = 3 e1 + 2 e2 in small units: use e1=60px, e2=60px => v = (90+180, 240-120) = (270,120) -->

  <!-- the two basis vectors, ink -->
  <line x1="90" y1="240" x2="150" y2="240" stroke="#141414" stroke-width="2.6" marker-end="url(#bcink)"/>
  <line x1="90" y1="240" x2="90" y2="180" stroke="#141414" stroke-width="2.6" marker-end="url(#bcink)"/>

  <!-- the recipe path to v: 3 east then 2 north, faint pine dashed -->
  <polyline points="90,240 270,240 270,120" fill="none" stroke="#1B5E43" stroke-width="1.4" stroke-dasharray="5 4" opacity="0.7"/>

  <!-- v itself, pine -->
  <line x1="90" y1="240" x2="270" y2="120" stroke="#1B5E43" stroke-width="2.4" marker-end="url(#bcpine)"/>

  <circle cx="90" cy="240" r="3" fill="#141414"/>

  <!-- labels -->
  <text x="120" y="262" font-size="14" fill="#141414" font-style="italic">e₁</text>
  <text x="66" y="212" font-size="14" fill="#141414" font-style="italic">e₂</text>
  <text x="278" y="118" font-size="14" fill="#1B5E43" font-style="italic">v = 3e₁ + 2e₂</text>
</svg>