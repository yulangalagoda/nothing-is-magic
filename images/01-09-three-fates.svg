<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" font-family="Georgia, serif">
  <defs>
    <marker id="tfink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#141414"/>
    </marker>
    <marker id="tfpine" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B5E43"/>
    </marker>
  </defs>

  <!-- PANEL 1: unique -->
  <text x="75" y="30" font-size="12" fill="#141414" text-anchor="middle">one solution</text>
  <text x="75" y="46" font-size="9" fill="#4a4a4a" text-anchor="middle">no collapse</text>
  <circle cx="75" cy="160" r="2.5" fill="#141414"/>
  <line x1="75" y1="160" x2="120" y2="120" stroke="#1B5E43" stroke-width="2.2" marker-end="url(#tfpine)"/>
  <circle cx="120" cy="120" r="4" fill="none" stroke="#141414" stroke-width="1.5"/>
  <text x="128" y="118" font-size="11" fill="#141414" font-style="italic">b</text>
  <text x="75" y="250" font-size="10" fill="#4a4a4a" text-anchor="middle">one start lands</text>
  <text x="75" y="263" font-size="10" fill="#4a4a4a" text-anchor="middle">on b</text>

  <!-- PANEL 2: none -->
  <text x="230" y="30" font-size="12" fill="#141414" text-anchor="middle">no solution</text>
  <text x="230" y="46" font-size="9" fill="#4a4a4a" text-anchor="middle">collapse misses b</text>
  <line x1="185" y1="200" x2="285" y2="120" stroke="#1B5E43" stroke-width="4" opacity="0.30"/>
  <text x="255" y="205" font-size="10" fill="#1B5E43" text-anchor="middle">image (a line)</text>
  <circle cx="250" cy="80" r="4" fill="none" stroke="#141414" stroke-width="1.5"/>
  <text x="258" y="78" font-size="11" fill="#141414" font-style="italic">b</text>
  <text x="230" y="250" font-size="10" fill="#4a4a4a" text-anchor="middle">b is off the line;</text>
  <text x="230" y="263" font-size="10" fill="#4a4a4a" text-anchor="middle">nothing reaches it</text>

  <!-- PANEL 3: infinite -->
  <text x="385" y="30" font-size="12" fill="#141414" text-anchor="middle">infinite solutions</text>
  <text x="385" y="46" font-size="9" fill="#4a4a4a" text-anchor="middle">collapse hits b</text>
  <line x1="340" y1="200" x2="440" y2="120" stroke="#1B5E43" stroke-width="4" opacity="0.30"/>
  <circle cx="390" cy="160" r="4" fill="none" stroke="#141414" stroke-width="1.5"/>
  <text x="398" y="158" font-size="11" fill="#141414" font-style="italic">b</text>
  <!-- several faint arrows all landing on b -->
  <line x1="345" y1="230" x2="390" y2="160" stroke="#9a9a9a" stroke-width="1" opacity="0.6"/>
  <line x1="375" y1="240" x2="390" y2="160" stroke="#9a9a9a" stroke-width="1" opacity="0.6"/>
  <line x1="410" y1="235" x2="390" y2="160" stroke="#9a9a9a" stroke-width="1" opacity="0.6"/>
  <text x="385" y="263" font-size="10" fill="#4a4a4a" text-anchor="middle">many starts land on b</text>
</svg>