<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" font-family="Georgia, serif">
  <defs>
    <marker id="cmink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#141414"/>
    </marker>
    <marker id="cmpine" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B5E43"/>
    </marker>
    <marker id="cmgrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9a9a"/>
    </marker>
  </defs>

  <!-- three stages, left to right, each a small origin -->
  <!-- STAGE 1: start -->
  <text x="75" y="35" font-size="12" fill="#4a4a4a" text-anchor="middle">start</text>
  <circle cx="55" cy="210" r="2.5" fill="#141414"/>
  <line x1="55" y1="210" x2="105" y2="210" stroke="#141414" stroke-width="2.2" marker-end="url(#cmink)"/>
  <line x1="55" y1="210" x2="55" y2="160" stroke="#1B5E43" stroke-width="2.2" marker-end="url(#cmpine)"/>

  <text x="145" y="190" font-size="16" fill="#9a9a9a" text-anchor="middle">→</text>
  <text x="145" y="205" font-size="9" fill="#9a9a9a" text-anchor="middle">first</text>

  <!-- STAGE 2: after first transform (a shear, say) -->
  <text x="235" y="35" font-size="12" fill="#4a4a4a" text-anchor="middle">after first move</text>
  <circle cx="200" cy="210" r="2.5" fill="#141414"/>
  <line x1="200" y1="210" x2="250" y2="210" stroke="#141414" stroke-width="2.2" marker-end="url(#cmink)"/>
  <line x1="200" y1="210" x2="230" y2="160" stroke="#1B5E43" stroke-width="2.2" marker-end="url(#cmpine)"/>

  <text x="300" y="190" font-size="16" fill="#9a9a9a" text-anchor="middle">→</text>
  <text x="300" y="205" font-size="9" fill="#9a9a9a" text-anchor="middle">second</text>

  <!-- STAGE 3: after second transform (a rotation-ish) -->
  <text x="395" y="35" font-size="12" fill="#4a4a4a" text-anchor="middle">after both</text>
  <circle cx="370" cy="210" r="2.5" fill="#141414"/>
  <line x1="370" y1="210" x2="410" y2="178" stroke="#141414" stroke-width="2.2" marker-end="url(#cmink)"/>
  <line x1="370" y1="210" x2="392" y2="162" stroke="#1B5E43" stroke-width="2.2" marker-end="url(#cmpine)"/>

  <!-- caption-ish note -->
  <text x="230" y="258" font-size="11" fill="#4a4a4a" text-anchor="middle" font-style="italic">the two final arrows, as columns, are the product matrix</text>
</svg>